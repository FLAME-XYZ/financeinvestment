<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EquityFlow | Trade Journal</title>
    
        <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquityFlow">
<meta name="theme-color" content="#1e293b">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 16px 12px 90px;
            min-height: 100vh;
            transition: background 0.25s ease, color 0.2s ease;
        }

        body.dark {
            background: #0f1219;
            color: #eef2ff;
        }

        .app-wrapper {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Logo di atas - SAMA PERSIS DENGAN KALENDER */
        .logo-top {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-oval {
            background: linear-gradient(125deg, #1e293b, #0f172a);
            padding: 10px 32px;
            border-radius: 100px;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            display: inline-block;
        }
        body.dark .logo-oval { background: linear-gradient(125deg, #2d3a4e, #1a2538); }
        
        /* GRID 2 KOLOM untuk Nama Orang dan Mode - SAMA PERSIS DENGAN KALENDER */
        .two-column-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        /* Card untuk masing-masing kolom */
        .grid-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        body.dark .grid-card { 
            background: rgba(30,41,59,0.8); 
            border-color: #334155; 
        }
        .grid-card:hover {
            background: rgba(255,255,255,0.85);
            transform: translateY(-1px);
        }
        body.dark .grid-card:hover {
            background: rgba(40, 55, 80, 0.9);
        }
        
        /* Kolom Kiri: Nama Trader */
        .trader-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .trader-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        #traderNameInput {
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 0;
            width: 100%;
            outline: none;
            color: #0f172a;
            font-family: inherit;
        }
        body.dark #traderNameInput { color: #f1f5f9; }
        #traderNameInput::placeholder {
            color: #94a3b8;
        }
        
        /* Kolom Kanan: Mode Dark/Light */
        .mode-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }
        .mode-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }
        body.dark .mode-label {
            color: #cbd5e1;
        }
        .theme-toggle-btn {
            background: #1e293b;
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            color: white;
            transition: all 0.2s;
            min-width: 100px;
        }
        body.dark .theme-toggle-btn {
            background: #3b82f6;
            color: white;
        }
        .theme-toggle-btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        body.dark .card {
            background: rgba(20, 28, 38, 0.9);
            border-color: #2d3748;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
            align-items: flex-end;
        }

        .field {
            flex: 1;
            min-width: 130px;
        }

        label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6c7a91;
        }

        input,
        select,
        button {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 0.85rem;
            width: 100%;
            font-family: inherit;
        }

        body.dark input,
        body.dark select {
            background: #1e293b;
            border-color: #3f4e67;
            color: #f1f5f9;
        }

        button {
            background: #1e293b;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }

        body.dark .btn-outline {
            border-color: #475569;
            color: #e2e8f0;
        }

        /* tabel dengan border rapi + kotak */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        body.dark .table-wrapper {
            border-color: #2d3a4e;
            background: #0f1219;
        }

        .trade-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 500px;
        }

        .trade-table th,
        .trade-table td {
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        body.dark .trade-table th,
        body.dark .trade-table td {
            border-color: #2d3a4e;
        }

        .trade-table th {
            background: #f1f5f9;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        body.dark .trade-table th {
            background: #1e293b;
            color: #cbd5e6;
        }

        .profit-clr {
            color: #10b981;
            font-weight: 600;
        }

        .loss-clr {
            color: #dc2626;
            font-weight: 600;
        }

        .edit-trade-btn {
            background: #e2e8f0;
            color: #1e293b;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        body.dark .edit-trade-btn {
            background: #334155;
            color: white;
        }

        .edit-trade-btn:hover {
            background: #cbd5e1;
        }

        /* toast notification */
        .toast-notify {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            white-space: nowrap;
        }

        body.dark .toast-notify {
            background: #0f172a;
            border: 1px solid #334155;
        }

        .toast-notify.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }

        body.dark .bottom-nav {
            background: rgba(20, 28, 40, 0.94);
        }

        .nav-item {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #4b5563;
            text-decoration: none;
            display: inline-block;
        }

        body.dark .nav-item {
            color: #9ca3af;
        }

        .nav-item.active {
            background: #1e293b;
            color: white;
        }

        body.dark .nav-item.active {
            background: #3b82f6;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            opacity: 0.5;
        }

        @media (max-width: 560px) {
            .nav-item {
                padding: 6px 16px;
                font-size: 0.75rem;
            }
            .bottom-nav {
                gap: 4px;
                padding: 5px 12px;
            }
            .trade-table th,
            .trade-table td {
                padding: 8px 4px;
                font-size: 0.7rem;
            }
            .toast-notify {
                white-space: normal;
                text-align: center;
                max-width: 85vw;
                font-size: 0.75rem;
                padding: 10px 18px;
            }
            .two-column-grid {
                gap: 10px;
            }
            .grid-card {
                padding: 6px 14px;
            }
            .theme-toggle-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Logo di tengah atas - SAMA PERSIS DENGAN KALENDER -->
    <div class="logo-top">
        <div class="logo-oval"> EQUITY FLOW </div>
    </div>
    
    <!-- GRID 2 KOLOM: Nama Orang (kiri) dan Mode (kanan) - SAMA PERSIS DENGAN KALENDER -->
    <div class="two-column-grid">
        <!-- Kolom Kiri: Nama Trader -->
        <div class="grid-card">
            <div class="trader-wrapper">
                <span class="trader-icon">👤</span>
                <input type="text" id="traderNameInput" placeholder="Nama Trader" maxlength="28">
            </div>
        </div>
        
        <!-- Kolom Kanan: Mode Dark/Light -->
        <div class="grid-card">
            <div class="mode-wrapper">
                <span class="mode-label">Tema Mode</span>
                <button class="theme-toggle-btn" id="darkModeToggle">🌙 Dark</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="form-group">
            <div class="field"><label></label><input type="month" id="monthSelect" value="2026-01"></div>
            <div class="field"><label></label><input type="number" id="modalAwalInput" placeholder="Rp"></div>
            <div class="field"><label></label><button id="resetMonthBtn" class="btn-outline">Reset</button></div>
        </div>
        <div class="form-group">
            <div class="field"><label>Pencatatan Hari Ke-<span id="nextDaySpan">1</span></label><input type="number" id="tradeAmount" placeholder="+500000 / -200000"></div>
            <div class="field"><button id="saveTradeBtn">Simpan PnL</button></div>
        </div>

        <!-- Tabel dengan border rapi & scroll horizontal -->
        <div class="table-wrapper">
            <table class="trade-table">
                <thead>
                    <tr>
                        <th>Hari</th>
                        <th>Tanggal</th>
                        <th>P/L (Rp)</th>
                        <th>Equity Akhir</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tradeTableBody">
                    <tr><td colspan="5">Memuat...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <footer>© EquityFlow • Aplikasi Finance and Investment</footer>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item" data-nav="beranda">Beranda</a>
    <a href="trade.html" class="nav-item active" data-nav="trade">Trade</a>
    <a href="kalender.html" class="nav-item" data-nav="kalender">Kalender</a>
</div>

<script>
    let tradingDB = {
        monthsData: {},
        globalStats: { totalProfitRp: 0, totalLossRp: 0, profitCount: 0, lossCount: 0, netWorth: 0 },
        traderName: "Jo Investor Muda."
    };

    // Toast notifikasi
    function showToast(message, isError = false) {
        let toast = document.getElementById("dynamicToast");
        if (!toast) {
            toast = document.createElement("div");
            toast.id = "dynamicToast";
            toast.className = "toast-notify";
            document.body.appendChild(toast);
        }
        toast.innerText = message;
        toast.style.background = isError ? "#b91c1c" : "#1e293b";
        if (document.body.classList.contains("dark") && !isError) toast.style.background = "#0f172a";
        if (isError) toast.style.background = "#991b1b";
        toast.classList.add("show");
        setTimeout(() => {
            toast.classList.remove("show");
        }, 2800);
    }

    function saveToLocal() { localStorage.setItem("EquityFlowApp", JSON.stringify(tradingDB)); }

    function loadFromLocal() {
        const raw = localStorage.getItem("EquityFlowApp");
        if (raw) {
            try {
                const data = JSON.parse(raw);
                tradingDB = data;
                if (!tradingDB.monthsData) tradingDB.monthsData = {};
                if (!tradingDB.globalStats) tradingDB.globalStats = { totalProfitRp: 0, totalLossRp: 0, profitCount: 0, lossCount: 0, netWorth: 0 };
            } catch (e) { }
        }
        if (Object.keys(tradingDB.monthsData).length === 0) tradingDB.monthsData["2026-01"] = { modalAwal: 10000000, trades: {} };
        if (!tradingDB.traderName) tradingDB.traderName = "Aldo Setiawan";
        recalcGlobalStatsFromData();
        saveToLocal();
    }

    function recalcGlobalStatsFromData() {
        let totalProfitRp = 0, totalLossRp = 0, profitCount = 0, lossCount = 0;
        for (const monthKey in tradingDB.monthsData) {
            const trades = tradingDB.monthsData[monthKey].trades || {};
            for (const day in trades) {
                const val = trades[day].value;
                if (val > 0) { totalProfitRp += val; profitCount++; }
                else if (val < 0) { totalLossRp += Math.abs(val); lossCount++; }
            }
        }
        let lastEquity = 0;
        const sortedMonths = Object.keys(tradingDB.monthsData).sort();
        if (sortedMonths.length) {
            const lastMonth = sortedMonths[sortedMonths.length - 1];
            const monthObj = tradingDB.monthsData[lastMonth];
            let equity = monthObj.modalAwal;
            const tradesSorted = Object.entries(monthObj.trades).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
            for (const [_, trade] of tradesSorted) equity += trade.value;
            lastEquity = equity;
        } else lastEquity = 10000000;
        tradingDB.globalStats = { totalProfitRp, totalLossRp, profitCount, lossCount, netWorth: lastEquity };
        saveToLocal();
    }

    function getDaysInMonth(ym) { let [y, m] = ym.split("-").map(Number); return new Date(y, m, 0).getDate(); }

    function getMonthData(mKey, create = true) {
        if (!tradingDB.monthsData[mKey] && create) tradingDB.monthsData[mKey] = { modalAwal: 10000000, trades: {} };
        return tradingDB.monthsData[mKey] || null;
    }

    function recordTrade(monthKey, dayIndex, valueNum) {
        const month = getMonthData(monthKey, true);
        if (!month) return false;
        const totalDays = getDaysInMonth(monthKey);
        if (dayIndex < 1 || dayIndex > totalDays) return false;
        let prevEq = month.modalAwal;
        for (let i = 1; i < dayIndex; i++) if (month.trades[i]) prevEq += month.trades[i].value;
        const newEquity = prevEq + valueNum;
        month.trades[dayIndex] = { value: valueNum, equityAfter: newEquity };
        tradingDB.monthsData[monthKey] = month;
        saveToLocal();
        recalcGlobalStatsFromData();
        refreshTradeTableUI();
        showToast(`✅ Hari ke-${dayIndex} dicatat: ${valueNum > 0 ? '+' : ''}${valueNum.toLocaleString()}`, false);

        if (Object.keys(month.trades).length === totalDays) {
            const [year, mon] = monthKey.split("-").map(Number);
            let ny = year, nm = mon + 1;
            if (nm > 12) { ny++; nm = 1; }
            const nextKey = `${ny}-${String(nm).padStart(2, '0')}`;
            const finalEq = newEquity;
            if (!tradingDB.monthsData[nextKey]) tradingDB.monthsData[nextKey] = { modalAwal: finalEq, trades: {} };
            else tradingDB.monthsData[nextKey].modalAwal = finalEq;
            saveToLocal();
            recalcGlobalStatsFromData();
            refreshTradeTableUI();
            showToast(`🎉 Bulan ${monthKey} selesai! ${nextKey} siap dengan modal Rp ${finalEq.toLocaleString()}`, false);
        }
        return true;
    }

    function refreshTradeTableUI() {
        const monthKey = document.getElementById("monthSelect").value;
        const month = getMonthData(monthKey, true);
        const daysTotal = getDaysInMonth(monthKey);
        const trades = month.trades || {};
        let html = "";
        for (let d = 1; d <= daysTotal; d++) {
            const tr = trades[d];
            const dateStr = `${monthKey}-${String(d).padStart(2, '0')}`;
            if (tr) {
                const cls = tr.value > 0 ? "profit-clr" : (tr.value < 0 ? "loss-clr" : "");
                html += `<tr>
                            <td>${d}</td>
                            <td>${dateStr}</td>
                            <td class="${cls}">${tr.value > 0 ? '+' : ''}${tr.value.toLocaleString()}</td>
                            <td>Rp ${tr.equityAfter.toLocaleString()}</td>
                            <td><button class="edit-trade-btn" data-day="${d}" data-value="${tr.value}">✏️ Edit</button></td>
                         </tr>`;
            } else {
                html += `<tr>
                            <td>${d}</td>
                            <td>${dateStr}</td>
                            <td colspan="3" style="opacity:0.6; border:1px solid #e2e8f0;">—</td>
                         </tr>`;
            }
        }
        document.getElementById("tradeTableBody").innerHTML = html;
        let next = 1;
        for (let i = 1; i <= daysTotal; i++) if (!trades[i]) { next = i; break; }
        document.getElementById("nextDaySpan").innerText = next;
        document.getElementById("modalAwalInput").value = month.modalAwal;
        attachEditEvents();
    }

    function attachEditEvents() {
        document.querySelectorAll(".edit-trade-btn").forEach(btn => {
            btn.removeEventListener("click", handleEdit);
            btn.addEventListener("click", handleEdit);
        });
    }

    function handleEdit(e) {
        const day = parseInt(e.target.getAttribute("data-day"));
        const curr = parseInt(e.target.getAttribute("data-value"));
        const newVal = prompt(`Edit P/L hari ke-${day} (contoh: +500000 atau -200000):`, curr);
        if (newVal !== null && !isNaN(parseFloat(newVal))) {
            const monthKey = document.getElementById("monthSelect").value;
            const newModalRaw = parseFloat(document.getElementById("modalAwalInput").value);
            const month = getMonthData(monthKey, true);
            if (month && !isNaN(newModalRaw)) month.modalAwal = newModalRaw;
            saveToLocal();
            recordTrade(monthKey, day, parseFloat(newVal));
            showToast(`✏️ Hari ke-${day} diperbarui menjadi ${parseFloat(newVal) > 0 ? '+' : ''}${parseFloat(newVal).toLocaleString()}`, false);
        } else if (newVal !== null) {
            showToast("❌ Format tidak valid, gunakan angka saja.", true);
        }
    }

    // Event Listeners
    document.getElementById("saveTradeBtn").addEventListener("click", () => {
        const monthKey = document.getElementById("monthSelect").value;
        let modalRaw = document.getElementById("modalAwalInput").value;
        let modal = parseFloat(modalRaw);
        if (isNaN(modal)) modal = 10000000;
        const monthObj = getMonthData(monthKey, true);
        monthObj.modalAwal = modal;
        saveToLocal();

        const valRaw = document.getElementById("tradeAmount").value;
        const val = parseFloat(valRaw);
        if (isNaN(val)) {
            showToast(" Masukkan nominal profil/mines yang sesuai", true);
            return;
        }
        const daysTotal = getDaysInMonth(monthKey);
        let nextFree = 1;
        for (let i = 1; i <= daysTotal; i++) if (!monthObj.trades[i]) { nextFree = i; break; }
        if (nextFree > daysTotal) {
            showToast(` Bulan ${monthKey} sudah penuh. Buat bulan baru atau reset.`, true);
            return;
        }
        recordTrade(monthKey, nextFree, val);
        document.getElementById("tradeAmount").value = "";
    });

    document.getElementById("resetMonthBtn").addEventListener("click", () => {
        const mKey = document.getElementById("monthSelect").value;
        const newModal = parseFloat(document.getElementById("modalAwalInput").value);
        if (!isNaN(newModal)) {
            tradingDB.monthsData[mKey] = { modalAwal: newModal, trades: {} };
            saveToLocal();
            recalcGlobalStatsFromData();
            refreshTradeTableUI();
            showToast(` Reset bulan ${mKey} dengan modal Rp ${newModal.toLocaleString()}`, false);
        } else {
            showToast("modal tidak valid", true);
        }
    });

    document.getElementById("monthSelect").addEventListener("change", () => {
        refreshTradeTableUI();
    });

    // Trader name
    const traderInput = document.getElementById("traderNameInput");
    traderInput.value = tradingDB.traderName;
    traderInput.addEventListener("change", () => {
        tradingDB.traderName = traderInput.value;
        saveToLocal();
        showToast(`👤 Nama trader diubah: ${traderInput.value}`, false);
    });

    // Dark mode
    if (localStorage.getItem("themePref") === "dark") document.body.classList.add("dark");
    const darkToggleBtn = document.getElementById("darkModeToggle");
    darkToggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("themePref", isDark ? "dark" : "light");
        darkToggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
    });
    if (document.body.classList.contains("dark")) darkToggleBtn.innerText = "☀️ Light";
    else darkToggleBtn.innerText = "🌙 Dark";

    // sync antar tab
    window.addEventListener('storage', function (e) {
        if (e.key === 'EquityFlowApp') {
            loadFromLocal();
            refreshTradeTableUI();
            traderInput.value = tradingDB.traderName;
        }
    });

    loadFromLocal();
    refreshTradeTableUI();
</script>
</body>
</html>
