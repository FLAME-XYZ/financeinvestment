<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EquityFlow | Kalender</title>
    
        <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EquityFlow">
<meta name="theme-color" content="#1e293b">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 16px 12px 90px;
            min-height: 100vh;
            transition: background 0.25s ease, color 0.2s ease;
        }
        body.dark { background: #0f1219; color: #eef2ff; }
        .app-wrapper { max-width: 1280px; margin: 0 auto; }
        
        /* Logo di atas */
        .logo-top {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-oval {
            background: linear-gradient(125deg, #1e293b, #0f172a);
            padding: 10px 32px;
            border-radius: 100px;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            display: inline-block;
        }
        body.dark .logo-oval { background: linear-gradient(125deg, #2d3a4e, #1a2538); }
        
        /* GRID 2 KOLOM untuk Nama Orang dan Mode - MEMENUHI KANAN KIRI */
        .two-column-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        /* Card untuk masing-masing kolom */
        .grid-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(0,0,0,0.08);
            transition: all 0.2s ease;
        }
        body.dark .grid-card { 
            background: rgba(30,41,59,0.8); 
            border-color: #334155; 
        }
        .grid-card:hover {
            background: rgba(255,255,255,0.85);
            transform: translateY(-1px);
        }
        body.dark .grid-card:hover {
            background: rgba(40, 55, 80, 0.9);
        }
        
        /* Kolom Kiri: Nama Trader */
        .trader-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .trader-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        #traderNameInput {
            background: transparent;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 0;
            width: 100%;
            outline: none;
            color: #0f172a;
            font-family: inherit;
        }
        body.dark #traderNameInput { color: #f1f5f9; }
        #traderNameInput::placeholder {
            color: #94a3b8;
        }
        
        /* Kolom Kanan: Mode (Dark/Light) */
        .mode-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }
        .mode-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }
        body.dark .mode-label {
            color: #cbd5e1;
        }
        .theme-toggle-btn {
            background: #1e293b;
            border: none;
            border-radius: 60px;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            color: white;
            transition: all 0.2s;
            min-width: 100px;
        }
        body.dark .theme-toggle-btn {
            background: #3b82f6;
            color: white;
        }
        .theme-toggle-btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        body.dark .card { background: rgba(20, 28, 38, 0.9); border-color: #2d3748; }
        
        /* Header kalender: 3 kolom (prev, title, next) */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cal-nav-left, .cal-nav-right {
            flex: 0 0 auto;
        }
        .cal-title {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .btn-outline-sm {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        body.dark .btn-outline-sm { border-color: #475569; color: #e2e8f0; }
        .btn-outline-sm:hover { background: rgba(0,0,0,0.03); }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: transparent;
        }
        .cal-cell {
            background: #ffffffcc;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            padding: 10px 2px;
            text-align: center;
            transition: all 0.1s ease;
        }
        body.dark .cal-cell { background: #111827cc; border-color: #2d3e56; }
        
        /* WARNA SEL di mode terang & gelap */
        .cal-cell.profit-cal { 
            background: rgba(16, 185, 129, 0.25); 
            border-color: rgba(16, 185, 129, 0.4);
        }
        .cal-cell.loss-cal { 
            background: rgba(220, 38, 38, 0.25); 
            border-color: rgba(220, 38, 38, 0.4);
        }
        body.dark .cal-cell.profit-cal { 
            background: rgba(16, 185, 129, 0.3); 
            border-color: rgba(16, 185, 129, 0.6);
        }
        body.dark .cal-cell.loss-cal { 
            background: rgba(220, 38, 38, 0.35); 
            border-color: rgba(220, 38, 38, 0.6);
        }
        
        .cal-day-num { font-size: 0.85rem; font-weight: 700; line-height: 1.3; }
        .cal-value {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            white-space: nowrap;
        }
        .profit-cal .cal-value { color: #0b7e55; background: rgba(16, 185, 129, 0.2); }
        .loss-cal .cal-value { color: #b91c1c; background: rgba(220, 38, 38, 0.2); }
        body.dark .profit-cal .cal-value { color: #2ecc71; background: rgba(46, 204, 113, 0.25); }
        body.dark .loss-cal .cal-value { color: #ef4444; background: rgba(220, 38, 38, 0.3); }
        
        @media (max-width: 700px) {
            .calendar-grid { gap: 5px; }
            .cal-cell { padding: 6px 1px; border-radius: 10px; }
            .cal-day-num { font-size: 0.75rem; }
            .cal-value { font-size: 0.55rem; padding: 1px 3px; }
        }
        @media (max-width: 550px) {
            .cal-value { font-size: 0.5rem; }
            .cal-day-num { font-size: 0.7rem; }
            .btn-outline-sm { padding: 4px 10px; font-size: 0.7rem; }
            .two-column-grid {
                gap: 10px;
            }
            .grid-card {
                padding: 6px 14px;
            }
            .theme-toggle-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
                min-width: 80px;
            }
        }
        
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: flex-end;
        }
        .field { flex: 1; min-width: 160px; }
        label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6c7a91;
        }
        select, button {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 0.85rem;
            width: 100%;
            font-family: inherit;
        }
        body.dark select { background: #1e293b; border-color: #3f4e67; color: #f1f5f9; }
        button {
            background: #1e293b;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-download {
            background: #0f172a;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        body.dark .btn-download { background: #2563eb; }
        
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }
        body.dark .bottom-nav { background: rgba(20, 28, 40, 0.94); }
        .nav-item {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #4b5563;
            text-decoration: none;
            display: inline-block;
        }
        body.dark .nav-item { color: #9ca3af; }
        .nav-item.active {
            background: #1e293b;
            color: white;
        }
        body.dark .nav-item.active { background: #3b82f6; }
        @media (max-width: 560px) {
            .nav-item { padding: 6px 16px; font-size: 0.75rem; }
            .bottom-nav { gap: 4px; padding: 5px 12px; }
        }
        footer { text-align: center; margin-top: 24px; font-size: 0.65rem; opacity: 0.5; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- Logo di tengah atas -->
    <div class="logo-top">
        <div class="logo-oval"> EQUITY FLOW </div>
    </div>
    
    <!-- GRID 2 KOLOM: Nama Orang (kiri) dan Mode (kanan) - MEMENUHI KANAN KIRI -->
    <div class="two-column-grid">
        <!-- Kolom Kiri: Nama Trader -->
        <div class="grid-card">
            <div class="trader-wrapper">
                <span class="trader-icon">👤</span>
                <input type="text" id="traderNameInput" placeholder="Nama Trader" maxlength="28">
            </div>
        </div>
        
        <!-- Kolom Kanan: Mode Dark/Light -->
        <div class="grid-card">
            <div class="mode-wrapper">
                <span class="mode-label">Tema Mode</span>
                <button class="theme-toggle-btn" id="darkModeToggle">🌙 Dark</button>
            </div>
        </div>
    </div>

    <div class="card">
        <!-- KALENDER HEADER: 3 kolom (prev - title - next) -->
        <div class="calendar-header">
            <div class="cal-nav-left">
                <button id="prevMonthCal" class="btn-outline-sm">◀ Sebelumnya</button>
            </div>
            <div class="cal-title">
                <h3 id="currentMonthTitle" style="font-weight:700; font-size:1rem;">Januari 2026</h3>
            </div>
            <div class="cal-nav-right">
                <button id="nextMonthCal" class="btn-outline-sm">Berikutnya ▶</button>
            </div>
        </div>
        
        <div class="form-group">
            <div class="field"><label></label><select id="calendarViewMode"><option value="rupiah">PnL Rupiah</option><option value="persen">PnL Persentase</option></select></div>
            <div class="field" style="flex:0.5; min-width:100px;"><button id="shareCalendarBtn" class="btn-download">Unduh PnL</button></div>
        </div>
        
        <!-- Area kalender untuk screenshot -->
        <div id="calendarCaptureArea">
            <div id="calendarDynamicGrid" class="calendar-grid"></div>
        </div>
    </div>
    <footer>© EquityFlow • Aplikasi Finance and Investment</footer>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item" data-nav="beranda">Beranda</a>
    <a href="trade.html" class="nav-item" data-nav="trade">Trade</a>
    <a href="kalender.html" class="nav-item active" data-nav="kalender">Kalender</a>
</div>

<script>
    let tradingDB = {
        monthsData: {},
        globalStats: { totalProfitRp:0, totalLossRp:0, profitCount:0, lossCount:0, netWorth:0 },
        traderName: "Jo Investor Muda."
    };
    let currentMonthView = "2026-01";

    function saveToLocal() { localStorage.setItem("EquityFlowApp", JSON.stringify(tradingDB)); }
    
    function loadFromLocal() {
        const raw = localStorage.getItem("EquityFlowApp");
        if(raw) {
            try { 
                const data = JSON.parse(raw); 
                tradingDB = data; 
                if(!tradingDB.monthsData) tradingDB.monthsData = {}; 
                if(!tradingDB.globalStats) tradingDB.globalStats = { totalProfitRp:0, totalLossRp:0, profitCount:0, lossCount:0, netWorth:0 }; 
            } catch(e) {}
        }
        if(Object.keys(tradingDB.monthsData).length === 0) tradingDB.monthsData["2026-01"] = { modalAwal: 10000000, trades: {} };
        if(!tradingDB.traderName) tradingDB.traderName = "Aldo Setiawan";
        saveToLocal();
    }
    
    function getDaysInMonth(ym) { let [y,m]=ym.split("-").map(Number); return new Date(y, m, 0).getDate(); }
    
    function getMonthData(mKey, create=true) {
        if(!tradingDB.monthsData[mKey] && create) tradingDB.monthsData[mKey] = { modalAwal: 10000000, trades: {} };
        return tradingDB.monthsData[mKey] || null;
    }
    
    // Hitung total PnL bulan berjalan
    function calculateMonthPnL(monthKey) {
        const monthData = getMonthData(monthKey, false);
        if(!monthData) return 0;
        const trades = monthData.trades || {};
        let total = 0;
        Object.values(trades).forEach(t => { total += t.value; });
        return total;
    }
    
    function formatCompactNumber(num) {
        if(num === undefined || num === null) return "0";
        const absNum = Math.abs(num);
        let formatted = "";
        if(absNum >= 1_000_000) formatted = (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + "M";
        else if(absNum >= 1_000) formatted = (num / 1_000).toFixed(0) + "K";
        else formatted = num.toString();
        return (num > 0 ? "+" : "") + formatted;
    }
    
    function renderCalendarView(monthKey) {
        currentMonthView = monthKey;
        const monthData = getMonthData(monthKey, true);
        const daysTotal = getDaysInMonth(monthKey);
        const [year, month] = monthKey.split("-").map(Number);
        const firstDayIdx = new Date(year, month-1, 1).getDay();
        const trades = monthData?.trades || {};
        const viewMode = document.getElementById("calendarViewMode")?.value || "rupiah";
        let gridHtml = "";
        const weekdays = ["S", "M", "T", "W", "T", "F", "S"];
        weekdays.forEach(day => { 
            gridHtml += `<div class="cal-cell" style="font-weight:700; background:transparent; border:none; font-size:0.7rem;">${day}</div>`; 
        });
        for(let i=0; i<firstDayIdx; i++) gridHtml += `<div class="cal-cell" style="opacity:0.4; background:transparent;"></div>`;
        for(let d=1; d<=daysTotal; d++) {
            const trade = trades[d];
            let cellClass = "cal-cell";
            let displayVal = "";
            if(trade) {
                const val = trade.value;
                if(val > 0) cellClass += " profit-cal";
                else if(val < 0) cellClass += " loss-cal";
                if(viewMode === "rupiah") {
                    displayVal = formatCompactNumber(val);
                } else {
                    let prevEq = monthData.modalAwal;
                    for(let i=1;i<d;i++) if(trades[i]) prevEq += trades[i].value;
                    const percent = prevEq !== 0 ? (val / Math.abs(prevEq)) * 100 : 0;
                    displayVal = `${val>0?'+':''}${percent.toFixed(1)}%`;
                }
            }
            if(trade) {
                gridHtml += `<div class="${cellClass}">
                                <div class="cal-day-num">${d}</div>
                                <div class="cal-value">${displayVal}</div>
                             </div>`;
            } else {
                gridHtml += `<div class="${cellClass}">
                                <div class="cal-day-num">${d}</div>
                                <div class="cal-value" style="opacity:0.4;">—</div>
                             </div>`;
            }
        }
        document.getElementById("calendarDynamicGrid").innerHTML = gridHtml;
        const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        document.getElementById("currentMonthTitle").innerHTML = `${monthNames[month-1]} ${year}`;
    }

    // Fungsi untuk generate screenshot dengan header PnL bulan + title yang lebih jelas
    async function captureCalendarWithTitle() {
        const monthKey = currentMonthView;
        const [year, monthNum] = monthKey.split("-").map(Number);
        const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const monthName = monthNames[monthNum-1];
        const totalPnL = calculateMonthPnL(monthKey);
        const pnlFormatted = formatCompactNumber(totalPnL);
        const pnlColor = totalPnL >= 0 ? "#10b981" : "#ef4444";
        
        // Buat elemen sementara untuk screenshot tanpa mengganggu tampilan asli
        const captureDiv = document.createElement('div');
        captureDiv.style.backgroundColor = getComputedStyle(document.body).backgroundColor;
        captureDiv.style.padding = "20px";
        captureDiv.style.borderRadius = "28px";
        captureDiv.style.fontFamily = "'Inter', system-ui, sans-serif";
        captureDiv.style.width = "fit-content";
        captureDiv.style.minWidth = "600px";
        
        // Tambahkan judul bulan + PnL
        const titleSection = document.createElement('div');
        titleSection.style.display = "flex";
        titleSection.style.justifyContent = "space-between";
        titleSection.style.alignItems = "baseline";
        titleSection.style.marginBottom = "20px";
        titleSection.style.borderBottom = "2px solid #e2e8f0";
        titleSection.style.paddingBottom = "12px";
        
        const monthTitleSpan = document.createElement('span');
        monthTitleSpan.style.fontSize = "1.6rem";
        monthTitleSpan.style.fontWeight = "800";
        monthTitleSpan.style.color = getComputedStyle(document.body).color;
        monthTitleSpan.innerText = `${monthName} ${year}`;
        
        const pnlSpan = document.createElement('span');
        pnlSpan.style.fontSize = "1.2rem";
        pnlSpan.style.fontWeight = "700";
        pnlSpan.style.backgroundColor = totalPnL >= 0 ? "rgba(16,185,129,0.15)" : "rgba(220,38,38,0.15)";
        pnlSpan.style.padding = "6px 16px";
        pnlSpan.style.borderRadius = "100px";
        pnlSpan.style.color = pnlColor;
        pnlSpan.innerText = `PnL ${totalPnL >= 0 ? '+' : ''}${pnlFormatted}`;
        
        titleSection.appendChild(monthTitleSpan);
        titleSection.appendChild(pnlSpan);
        
        // Clone grid kalender
        const originalGrid = document.getElementById("calendarDynamicGrid");
        const gridClone = originalGrid.cloneNode(true);
        gridClone.style.marginTop = "10px";
        gridClone.style.gap = "8px";
        
        captureDiv.appendChild(titleSection);
        captureDiv.appendChild(gridClone);
        
        // Tambahkan footer kecil (opsional)
        const footerNote = document.createElement('div');
        footerNote.style.marginTop = "20px";
        footerNote.style.fontSize = "10px";
        footerNote.style.opacity = "0.6";
        footerNote.style.textAlign = "center";
        footerNote.innerText = `EquityFlow • ${tradingDB.traderName || "Trader"}`;
        captureDiv.appendChild(footerNote);
        
        document.body.appendChild(captureDiv);
        captureDiv.style.position = 'absolute';
        captureDiv.style.top = '-9999px';
        captureDiv.style.left = '-9999px';
        
        if(typeof html2canvas !== "undefined") {
            try {
                const canvas = await html2canvas(captureDiv, { 
                    scale: 2.5, 
                    backgroundColor: getComputedStyle(document.body).backgroundColor,
                    logging: false,
                    useCORS: true
                });
                const link = document.createElement('a');
                link.download = `EquityFlow_${monthName}_${year}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } catch(err) {
                alert("Gagal generate gambar: " + err);
            }
        } else {
            alert("Library html2canvas masih dimuat, coba lagi sebentar...");
        }
        document.body.removeChild(captureDiv);
    }
    
    // Event listeners
    document.getElementById("calendarViewMode").addEventListener("change", () => renderCalendarView(currentMonthView));
    document.getElementById("prevMonthCal").addEventListener("click", () => {
        let [y,m] = currentMonthView.split("-").map(Number); m--; if(m<1) { y--; m=12; }
        currentMonthView = `${y}-${String(m).padStart(2,'0')}`;
        renderCalendarView(currentMonthView);
    });
    document.getElementById("nextMonthCal").addEventListener("click", () => {
        let [y,m] = currentMonthView.split("-").map(Number); m++; if(m>12) { y++; m=1; }
        currentMonthView = `${y}-${String(m).padStart(2,'0')}`;
        renderCalendarView(currentMonthView);
    });
    
    // Tombol unduh dengan title + PnL bulan
    document.getElementById("shareCalendarBtn").addEventListener("click", () => {
        captureCalendarWithTitle();
    });
    
    // Trader Name
    const traderInput = document.getElementById("traderNameInput");
    traderInput.value = tradingDB.traderName;
    traderInput.addEventListener("change", () => { tradingDB.traderName = traderInput.value; saveToLocal(); });
    
    // Dark mode
    if(localStorage.getItem("themePref") === "dark") document.body.classList.add("dark");
    const darkToggleBtn = document.getElementById("darkModeToggle");
    darkToggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        localStorage.setItem("themePref", isDark ? "dark" : "light");
        darkToggleBtn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
        // re-render untuk pastikan warna cell gelap/terang langsung update
        renderCalendarView(currentMonthView);
    });
    if(document.body.classList.contains("dark")) darkToggleBtn.innerText = "☀️ Light";
    else darkToggleBtn.innerText = "🌙 Dark";
    
    // Listener untuk perubahan storage (multi tab)
    window.addEventListener('storage', function(e) {
        if(e.key === 'EquityFlowApp') {
            loadFromLocal();
            renderCalendarView(currentMonthView);
            traderInput.value = tradingDB.traderName;
        }
    });
    
    // Load html2canvas jika belum ada
    if(typeof html2canvas === 'undefined') { 
        const script = document.createElement('script'); 
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"; 
        script.onload = () => console.log("html2canvas loaded");
        document.head.appendChild(script); 
    }
    
    loadFromLocal();
    renderCalendarView("2026-01");
</script>
</body>
</html>
